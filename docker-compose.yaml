services:
  inference:
    image: vllm/vllm-openai:latest
    ports:
      - 8080:8080
    command:
      - "--model"
      - "Qwen/Qwen3-VL-8B-Instruct"
      - "--port"
      - "8080"
      - "--quantization"
      - "bitsandbytes"
      - "--max_model_len"
      - "12800"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/models || exit 1"]
      interval: 120s
      timeout: 120s
      retries: 4
      start_period: 120s

  pipeline:
    build: .
    depends_on:
      inference:
        condition: service_healthy
    environment:
      SERVER_ADDRESS: "http://inference:8080/v1"
