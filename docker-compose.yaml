x-llama-cpp-base: &llama-cpp-base
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  network_mode: host
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: ["gpu"]
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/models || exit 1"]
    interval: 120s
    timeout: 120s
    retries: 4
    start_period: 120s

x-llama-cpp-common-env: &llama-cpp-common-env
  LLAMA_ARG_CTX_SIZE: 128000
  LLAMA_ARG_N_GPU_LAYERS: 99
  LLAMA_ARG_PORT: 8080

x-pipeline-base: &pipeline-base
  build: .
  network_mode: host
  volumes:
    - ./logs:/app/logs
    - ./pddl:/app/pddl
    - ./plans:/app/plans
    - ./results:/app/results

services:
  ### SERVERS
  gpt_oss_20b:
    <<: *llama-cpp-base
    profiles: ["gpt_oss_20b"]
    command:
      - "--jinja"
      - "--temp"
      - "1.0"
      - "--top-k"
      - "0"
      - "--top-p"
      - "1.0"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/gpt-oss-20b-GGUF:q4_k_m

  gpt_oss_120b:
    <<: *llama-cpp-base
    profiles: ["gpt_oss_120b"]
    command:
      - "--jinja"
      - "--temp"
      - "1.0"
      - "--top-k"
      - "0"
      - "--top-p"
      - "1.0"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/gpt-oss-120b-GGUF:q4_k_m

  gemma_4_e4b:
    <<: *llama-cpp-base
    profiles: ["gemma_4_e4b"]
    command:
      - "--jinja"
      - "--temp"
      - "1.0"
      - "--top-k"
      - "64"
      - "--top-p"
      - "0.95"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/gemma-4-E4B-it-GGUF:q4_k_m

  gemma_4_31b:
    <<: *llama-cpp-base
    profiles: ["gemma_4_31b"]
    command:
      - "--jinja"
      - "--temp"
      - "1.0"
      - "--top-k"
      - "64"
      - "--top-p"
      - "0.95"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/gemma-4-31B-it-GGUF:q4_k_m

  qwen_35_4b:
    <<: *llama-cpp-base
    profiles: ["qwen_35_4b"]
    command:
      - "--jinja"
      - "--temp"
      - "0.6"
      - "--top-k"
      - "20"
      - "--top-p"
      - "0.8"
      - "--min-p"
      - "0.0"
      - "--presence-penalty"
      - "0.0"
      - "--repeat-penalty"
      - "1.0"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/Qwen3.5-4B-GGUF:q4_k_m

  qwen_35_122b:
    <<: *llama-cpp-base
    profiles: ["qwen_35_122b"]
    command:
      - "--jinja"
      - "--temp"
      - "0.6"
      - "--top-k"
      - "20"
      - "--top-p"
      - "0.95"
      - "--min-p"
      - "0.0"
      - "--presence-penalty"
      - "0.0"
      - "--repeat-penalty"
      - "1.0"
      - "--flash-attn"
      - "on"
    environment:
      <<: *llama-cpp-common-env
      LLAMA_ARG_HF_REPO: unsloth/Qwen3.5-122B-A10B-GGUF:q4_k_m


  ### PIPELINES
  pipeline:
    <<: *pipeline-base
    profiles: ["pipeline"]
